<h1 id="%E5%AF%BE%E8%A9%B1%E5%9E%8Bai%E3%81%AE%E8%A8%98%E6%86%B6%E7%AE%A1%E7%90%86-1">対話型AIの記憶管理</h1>

<p>（1ヶ月前）人間「パソコンが壊れた」<br />
（今日）人間「パソコンを買ったよ」 → AI「前壊れたって言ってたもんね！」</p>
<p><strong>1ヶ月間の対話を全部LLMに入れるわけにもいかないがどうすればいい...？</strong></p>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" data-marpit-pagination="2" style="--paginate:true;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;" data-marpit-pagination-total="19">
<header>AI Talks #7 - 対話型AIの記憶管理</header>
<h1 id="%E3%82%B3%E3%83%B3%E3%83%86%E3%82%AD%E3%82%B9%E3%83%88%E7%AE%A1%E7%90%86%E3%82%92%E3%81%97%E3%82%88%E3%81%86">コンテキスト管理をしよう</h1>
<h2 id="llm%E3%81%AE%E9%99%90%E7%95%8C">LLMの限界</h2>
<ul>
<li><a href="https://ai.google.dev/gemini-api/docs/long-context?hl=ja">コンテキストウィンドウ（入力上限）</a>がある（小説8冊分とか入る）</li>
<li>詰め込みすぎると指示を無視したり、遅くなったり、性能劣化する</li>
</ul>
<p>↓ <strong>LLMに与える情報を管理してあげる必要がある</strong></p>
<h2 id="span-classred%E3%82%B3%E3%83%B3%E3%83%86%E3%82%AD%E3%82%B9%E3%83%88%E3%82%A8%E3%83%B3%E3%82%B8%E3%83%8B%E3%82%A2%E3%83%AA%E3%83%B3%E3%82%B0span"><span class="red">コンテキストエンジニアリング</span></h2>
<p>無数に増えていく会話履歴やユーザー情報を</p>
<ul>
<li>どう保存するか（そのまま？ラベル付け？集計？圧縮？）</li>
<li>どう検索するか（最新N件？関連度？重要度？）</li>
</ul>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" data-marpit-pagination="3" style="--paginate:true;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;" data-marpit-pagination-total="19">
<header>AI Talks #7 - 対話型AIの記憶管理</header>
<h1 id="%E3%82%B3%E3%83%B3%E3%83%86%E3%82%AD%E3%82%B9%E3%83%88%E7%AE%A1%E7%90%86%E3%81%A7%E6%84%8F%E8%AD%98%E3%81%99%E3%82%8B%E3%81%93%E3%81%A8">コンテキスト管理で意識すること</h1>
<div class="text-center">
<p><img src="fig/context-engineering.svg" alt="" style="height:280px;" /></p>
</div>
<ul>
<li>データ取得時の<strong>検索クエリ</strong> と データ保存時の<strong>加工処理</strong>が設計ポイント！</li>
<li>レイテンシを気にする会話では<strong>取得時の処理の重さ</strong>を気にすることになる</li>
<li><strong>保存時は非同期</strong>（バックグラウンド）でやれることが多いので重くてもOK</li>
<li>保存タイミング: 毎ターン（直近1-2ターン）or セッション単位（履歴をまとめて）</li>
</ul>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>

<h1 id="%E5%8F%96%E5%BE%97%E6%99%82%E3%81%AE%E6%89%8B%E6%B3%95%E3%81%A8%E3%83%AC%E3%82%A4%E3%83%86%E3%83%B3%E3%82%B7">取得時の手法とレイテンシ</h1>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" data-marpit-pagination="6" style="--paginate:true;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;" data-marpit-pagination-total="19">
<header>AI Talks #7 - 対話型AIの記憶管理</header>
<h1 id="%E7%9F%AD%E6%9C%9F%E8%A8%98%E6%86%B6-%E3%82%BB%E3%83%83%E3%82%B7%E3%83%A7%E3%83%B3%E5%86%85%E3%83%A1%E3%83%A2%E3%83%AA">短期記憶: セッション内メモリ</h1>
<p>システム的に扱いやすい小さい単位（セッション）があれば会話履歴をそのまま扱う</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-json"><span class="hljs-punctuation">[</span>
  <span class="hljs-punctuation">{</span><span class="hljs-attr">&quot;role&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;user&quot;</span><span class="hljs-punctuation">,</span> <span class="hljs-attr">&quot;content&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;こんにちは！&quot;</span><span class="hljs-punctuation">}</span><span class="hljs-punctuation">,</span>
  <span class="hljs-punctuation">{</span><span class="hljs-attr">&quot;role&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;assistant&quot;</span><span class="hljs-punctuation">,</span> <span class="hljs-attr">&quot;content&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;こんにちは！どうしましたか？&quot;</span><span class="hljs-punctuation">}</span><span class="hljs-punctuation">,</span>
  <span class="hljs-punctuation">{</span><span class="hljs-attr">&quot;role&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;user&quot;</span><span class="hljs-punctuation">,</span> <span class="hljs-attr">&quot;content&quot;</span><span class="hljs-punctuation">:</span> <span class="hljs-string">&quot;この前、〇〇したんだよね〜&quot;</span><span class="hljs-punctuation">}</span>
<span class="hljs-punctuation">]</span>
</code></pre>
<ul>
<li>基本、会話するたびにappendするだけ（コンテキストキャッシュが効く）</li>
<li>長い会話やセッション概念がない場合は<strong>スライドウィンドウや圧縮</strong>が入る
<ul>
<li><strong>スライドウィンドウ</strong>: 古い履歴を削除 or 古い履歴を<strong>要約</strong>して圧縮<br />
（LangChain, Letta, ADK, <a href="https://docs.cloud.google.com/vertex-ai/generative-ai/docs/live-api/start-manage-session?hl=ja#configure_the_context_window_of_the_session">Gemini Live API</a>等）</li>
<li>直近N件は保護し、<strong>古いツール出力の削除</strong>(OpenCode, OpenClaw, LangChain)</li>
</ul>
</li>
</ul>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" data-marpit-pagination="7" style="--paginate:true;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;" data-marpit-pagination-total="19">
<header>AI Talks #7 - 対話型AIの記憶管理</header>
<h1 id="%E7%9F%AD%E6%9C%9F%E8%A8%98%E6%86%B6-%E7%9B%B4%E8%BF%91%E3%82%BB%E3%83%83%E3%82%B7%E3%83%A7%E3%83%B3%E3%81%AE%E6%83%85%E5%A0%B1">短期記憶: 直近セッションの情報</h1>
<p>セッションまたいだら記憶が失われる対策</p>
<ul>
<li>前回セッションの会話履歴（の一部）</li>
<li><strong>直近N回のセッションの会話履歴の要約</strong>
<ul>
<li>保存時: 要約は非同期で行えば良い</li>
<li>取得時: 直近N件取ってくるだけ</li>
</ul>
</li>
</ul>
<p>ChatGPTは<a href="https://manthanguptaa.in/posts/chatgpt_memory/">直近15セッションの要約</a>と噂がある（非公式）<br />
SimpleMemでは、セッション開始時に<code>サマリー（~5件）→過去セッションの知見（~20件）→セマンティック検索（~10件）</code>の優先度順で指定トークン上限まで入れる</p>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" data-marpit-pagination="8" style="--paginate:true;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;" data-marpit-pagination-total="19">
<header>AI Talks #7 - 対話型AIの記憶管理</header>
<h1 id="%E9%95%B7%E6%9C%9F%E8%A8%98%E6%86%B6-%E6%8A%BD%E5%87%BA%E6%B8%88%E3%81%BF%E6%83%85%E5%A0%B1%E3%83%97%E3%83%AD%E3%83%95%E3%82%A3%E3%83%BC%E3%83%AB">長期記憶: 抽出済み情報（プロフィール）</h1>
<ul>
<li><strong>毎回必ずコンテキストに含めたいユーザーの情報を定義して抽出</strong>
<ul>
<li>例: 名前、生年月日、趣味、家族、重要イベントなど サービスで重要なこと</li>
<li>MemoryOSでは 性格・嗜好傾向を51項目で構造化抽出</li>
</ul>
</li>
<li>保存時: 会話から情報抽出、 取得時: 全部入れるだけ</li>
</ul>
<div class="text-center">
<p><img src="./fig/profile-extraction.svg" alt="" style="height:150px;" /></p>
</div>
<p>ChatGPTも<a href="https://manthanguptaa.in/posts/chatgpt_memory/">これに似た噂</a>があり、わかっているフリならこれでOK<br />
<span class="small">（私は最近ChatGPTにメモリを整理しろと言われてますが、UI上からも抽出している情報が見えますね）</span></p>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" data-marpit-pagination="9" style="--paginate:true;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;" data-marpit-pagination-total="19">
<header>AI Talks #7 - 対話型AIの記憶管理</header>
<h1 id="%E9%95%B7%E6%9C%9F%E8%A8%98%E6%86%B6-%E3%83%99%E3%82%AF%E3%83%88%E3%83%AB%E6%A4%9C%E7%B4%A2%E5%85%B8%E5%9E%8B%E7%9A%84%E3%81%AArag">長期記憶: ベクトル検索（典型的なRAG）</h1>
<p><strong>ベクトル検索</strong>で現在の会話内容に関連した過去の情報を取得</p>
<p><img src="fig/rag.svg" alt="" /></p>
<ul>
<li>保存時: 話題分割 or 要約 or ファクト抽出 （<a href="https://github.com/NirDiamant/RAG_Techniques">一般的なRAGテクニック</a>も使える）</li>
</ul>
<p>Mem0は、会話から事実をLLMで抽出し7カテゴリ（嗜好、個人情報、計画等）に分類<br />
SimpleMemは、代名詞解決・相対時間の絶対化・アトミックな事実文への分解</p>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" data-marpit-pagination="10" style="--paginate:true;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;" data-marpit-pagination-total="19">
<header>AI Talks #7 - 対話型AIの記憶管理</header>
<h1 id="%E9%95%B7%E6%9C%9F%E8%A8%98%E6%86%B6-%E6%A4%9C%E7%B4%A2%E7%B2%BE%E5%BA%A6%E3%82%92%E4%B8%8A%E3%81%92%E3%82%8B%E5%B7%A5%E5%A4%AB">長期記憶: 検索精度を上げる工夫</h1>
<ul>
<li><strong>ハイブリッド検索</strong>: ベクトルと全文検索などの組み合わせ
<ul>
<li>OpenClaw: ベクトルスコア×0.7 + BM25スコア×0.3 の重み付き合算</li>
<li>MemOS: グラフ、ベクトル、BM25、全文検索の4手法の並列後リランク</li>
</ul>
</li>
<li><strong>クエリ拡張</strong>: 指示語解決や文脈補完、言い換えなどで検索用文字列を生成
<ul>
<li>MemOS: LLMでサブクエリに分解→各embeddingで並列検索</li>
</ul>
</li>
<li><strong>リランキング</strong>: 検索結果をモデルで並べ替え
<ul>
<li>Mem0: Cohere、SentenceTransformer等</li>
<li>Zep: RRF、MMR、CrossEncoder等5種のリランカー</li>
</ul>
</li>
</ul>
<div class="small">
<p>BM25: 全文検索のスコア, RRF: 順位の逆数, MMR: 多様性確保,<br />
CrossEncoder: 質問と文書のスコア, Cohere: リランキングAPI（企業名）</p>
</div>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" data-marpit-pagination="11" style="--paginate:true;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;" data-marpit-pagination-total="19">
<header>AI Talks #7 - 対話型AIの記憶管理</header>
<h1 id="%E9%95%B7%E6%9C%9F%E8%A8%98%E6%86%B6-graph-rag">長期記憶: Graph RAG</h1>
<p>Entity（ノード）とRelation（エッジ）を<strong>ナレッジグラフ</strong>に保存し、構造的に検索</p>
<ul>
<li>Mem0:
<ul>
<li>保存時: LLMでEntity&amp;Relation抽出 → 既存ノードと類似度マッチで重複判定</li>
<li>検索時: Entity抽出→表記ゆれ吸収 → Cypherテンプレ走査 → BM25リランク</li>
</ul>
</li>
<li>GraphRAG:
<ul>
<li>保存時: グラフ構築→ノード群をクラスタ化→各クラスタに要約レポート生成</li>
<li>検索時: <strong>Local</strong>=Entity起点で周辺探索、<strong>Global</strong>=全レポート並列要約→集約、<strong>DRIFT</strong>=レポート起点→Local反復深堀り、<strong>Basic</strong>=直接ベクトル検索</li>
</ul>
</li>
</ul>
<p>LLMでCypherクエリ生成が難しい点はテンプレで解決<span class="small">（<a href="https://github.com/langchain-ai/langchain-neo4j">LangChain Neo4j</a>はLLMで生成）</span><br />
<strong>課題</strong>: 対策しても表記ゆれは起きる、遅い、LLM依存度が高く不安定</p>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" data-marpit-pagination="12" style="--paginate:true;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;" data-marpit-pagination-total="19">
<header>AI Talks #7 - 対話型AIの記憶管理</header>
<h1 id="%E8%A8%98%E6%86%B6%E6%95%B4%E7%90%86%E5%BF%98%E5%8D%B4%E6%9B%B4%E6%96%B0%E9%87%8D%E8%A4%87%E6%8E%92%E9%99%A4">記憶整理（忘却、更新、重複排除）</h1>
<ul>
<li>古い記憶を使いたくない（忘却）
<ul>
<li><strong>フィルター</strong>: ベクトル検索時にタイムスタンプで絞る</li>
<li><strong>時間減衰</strong>: スコアに減衰関数を掛けて古い記憶の優先度を下げる
<ul>
<li>ベクトル検索のインデックスが効かなくなるので<a href="https://milvus.io/docs/ja/decay-ranker-overview.md">リランキング</a>で対応</li>
</ul>
</li>
</ul>
</li>
<li>記憶のアップデートをしたい（重複判定含む）
<ul>
<li>保存時に<strong>ベクトル検索で既存記憶を取得→LLMが比較して判定</strong>（Mem0）
<ul>
<li>例: 「ペットを飼っている」+「嘘でした」→ 削除</li>
<li>例: 「ペットを1匹」+「もう一匹飼った」→ 「ペットを2匹飼っている」</li>
</ul>
</li>
</ul>
</li>
<li>記憶の変化を追跡したい（例: 「独身」→「結婚した」→「離婚した」など）
<ul>
<li>タイムスタンプや有効期間を付与し検索後に推移を追跡可能に（Zep）</li>
</ul>
</li>
</ul>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" data-marpit-pagination="13" style="--paginate:true;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;" data-marpit-pagination-total="19">
<header>AI Talks #7 - 対話型AIの記憶管理</header>
<h1 id="%E9%95%B7%E6%9C%9F%E8%A8%98%E6%86%B6-agentic%E6%A4%9C%E7%B4%A2">長期記憶: Agentic検索</h1>
<p><strong>Agentがコンテキスト取得ツールを何度も呼び出し、目的のコンテキストを探す</strong></p>
<ul>
<li>OpenCode: grep, glob, read等のツールを持つ<strong>explore専用サブエージェント</strong>へ依頼（Claude Code, Cursorなども同様と推測）</li>
<li>Letta: 記憶の読み書きツールをエージェントが自分で判断して呼び出す</li>
<li>MemOS: クエリ分析→検索→十分性Reflection→再検索のループ</li>
</ul>
<p>一般会話での難しさについて経験談:</p>
<ul>
<li><strong>ツール呼び出し判定がシビア</strong>（毎回調べるか全く調べないかになってしまう）
<ul>
<li>いつ調べるべきなのかわからないし、情報の十分性の基準もわからない</li>
</ul>
</li>
<li>レスポンス速度が遅い（自然な会話は500ms~1s程度で返さないと不自然）</li>
</ul>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" data-marpit-pagination="14" style="--paginate:true;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;" data-marpit-pagination-total="19">
<header>AI Talks #7 - 対話型AIの記憶管理</header>
<h1 id="%E3%81%9D%E3%81%AE%E4%BB%96%E3%81%AE%E5%B7%A5%E5%A4%AB">その他の工夫</h1>
<ul>
<li><strong>ラベル付け</strong>: メタデータ付与でSQLフィルタ検索を可能に（SimpleMem, Letta）</li>
<li><strong>階層型管理</strong>: 短期→中期→長期へ自動昇格<br />
（MemoryOS: deque溢れ→LLM要約でセッション化→ヒートスコア超で長期へ）</li>
<li><strong>参照カウント</strong>: エンティティ参照回数の上位N件を優先注入（Memary）</li>
<li><strong>重要度スコア</strong>: 記憶にスコアを持たせてメンテナンスに活用
<ul>
<li>MemoryOS: ヒートスコア=訪問回数・対話長・時間減衰の重み付き和</li>
<li>SimpleMem: 時間減衰・重複マージ判定・低スコア刈り込みに使用</li>
</ul>
</li>
<li><strong>レスポンス高速化</strong>
<ul>
<li>並列処理、Streaming、Thinkingを切る、フィラー（「えーと」等）時間稼ぎ</li>
<li>今までの会話情報から<a href="https://arxiv.org/abs/2403.05676">事前に検索</a>しておく、<a href="https://arxiv.org/abs/2508.04403">予測して準備</a>しておく</li>
</ul>
</li>
</ul>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="skip" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-class="vertical-center" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" class="vertical-center" style="--paginate:skip;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--class:vertical-center;--theme:default;--style:@import &quot;style.css&quot;;">
<header>AI Talks #7 - 対話型AIの記憶管理</header>

<h1 id="%E3%81%93%E3%81%93%E3%81%BE%E3%81%A7%E3%81%AE%E7%9F%A5%E8%AD%98%E3%82%92%E4%BD%BF%E3%81%A3%E3%81%A6%E8%A8%AD%E8%A8%88%E3%81%97%E3%81%A6%E3%81%BF%E3%82%88%E3%81%86">ここまでの知識を使って設計してみよう！</h1>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" data-marpit-pagination="15" style="--paginate:true;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;" data-marpit-pagination-total="19">
<header>AI Talks #7 - 対話型AIの記憶管理</header>
<h1 id="%E8%A8%AD%E8%A8%88%E4%BE%8B1-%E3%82%BB%E3%83%83%E3%82%B7%E3%83%A7%E3%83%B3%E5%8D%98%E4%BD%8D%E3%81%A7%E5%87%A6%E7%90%86">設計例1: セッション単位で処理</h1>
<p><img src="fig/example1.svg" alt="" /></p>
<p>セッション終了後にテーマ分割・プロフィール抽出で一括保存し、<br />
応答時は現在セッション＋検索でコンテキストを組み立てる</p>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" data-marpit-pagination="16" style="--paginate:true;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;" data-marpit-pagination-total="19">
<header>AI Talks #7 - 対話型AIの記憶管理</header>
<h1 id="%E8%A8%AD%E8%A8%88%E4%BE%8B2-%E3%83%95%E3%82%A1%E3%82%AF%E3%83%88%E6%8A%BD%E5%87%BA%E3%81%A8%E3%83%AA%E3%82%A2%E3%83%AB%E3%82%BF%E3%82%A4%E3%83%A0%E6%9B%B4%E6%96%B0">設計例2: ファクト抽出とリアルタイム更新</h1>
<p><img src="fig/example2.svg" alt="" /></p>
<p>対話のたびに抽出・類似判定でDBを更新し、応答時は類似検索とラベルで取得する</p>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" data-marpit-pagination="17" style="--paginate:true;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;" data-marpit-pagination-total="19">
<header>AI Talks #7 - 対話型AIの記憶管理</header>
<h1 id="%E8%A8%AD%E8%A8%88%E4%BE%8B3-agentic%E3%82%B5%E3%83%BC%E3%83%81">設計例3: Agenticサーチ</h1>
<p><img src="fig/example3.svg" alt="" /></p>
<p>ループして適応的に記憶検索ツールを使いこなし、必要なコンテキストを収集する</p>
<div class="small">
<p>（簡易実装ではLangChainの<code>creat_agent</code>、ADKの<code>LlmAgent</code>、Mastraの<code>Agent</code>等の<code>tools</code>に与えるだけ）</p>
</div>

<header>AI Talks #7 - 対話型AIの記憶管理</header>
<h1 id="%E6%89%8B%E6%B3%95%E3%81%A8%E6%94%B9%E5%96%84%E3%82%A4%E3%83%A1%E3%83%BC%E3%82%B8">手法と改善イメージ</h1>
<div class="tiny">
<p><strong>1年前</strong>:「文鳥チノを飼っている」「文鳥がペレットを食べない」 <strong>1ヶ月前</strong>:「パソコンが壊れちゃった」「来月登壇イベントがあるんだ」<br />
<strong>1週間前</strong>:「文鳥の雛にグラって名付けた」<strong>一昨日</strong>:「明後日キャンプ行くんだ」</p>
<table>
<thead>
<tr>
<th style="text-align:center">手法</th>
<th>人間の入力</th>
<th>AIの応答</th>
<th>解説</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:center">ベースライン</td>
<td>パソコンを買ったよ<br />今日めちゃめちゃ暑い</td>
<td><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/274c.svg" data-marp-twemoji=""/>️どんなパソコンを買ったの？<br /><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/274c.svg" data-marp-twemoji=""/>️そうだね！</td>
<td>当然覚えてない<br />適当に合わせた応答をする</td>
</tr>
<tr>
<td style="text-align:center">現在日時付与</td>
<td>今日めちゃめちゃ暑い</td>
<td><img class="emoji" draggable="false" alt="⭕️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/2b55.svg" data-marp-twemoji=""/>3月なのになんかあった？</td>
<td>地味に重要</td>
</tr>
<tr>
<td style="text-align:center">プロフィール</td>
<td>ペットショップに行かなきゃ</td>
<td><img class="emoji" draggable="false" alt="⭕️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/2b55.svg" data-marp-twemoji=""/>チノのエサが切れちゃった？</td>
<td>ペットのような関係性を抽出し保持</td>
</tr>
<tr>
<td style="text-align:center">直近サマリー</td>
<td>今日は楽しかったなー</td>
<td><img class="emoji" draggable="false" alt="⭕️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/2b55.svg" data-marp-twemoji=""/>もしかして今日キャンプだった？</td>
<td>直近情報を常に入れておけば可能</td>
</tr>
<tr>
<td style="text-align:center">ベクトル検索</td>
<td>パソコンを買ったよ<br />そろそろ登壇がある → 前その話した？<br />今日は緊張したよ</td>
<td><img class="emoji" draggable="false" alt="⭕️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/2b55.svg" data-marp-twemoji=""/>前壊れたって言ってたもんね！<br /><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/274c.svg" data-marp-twemoji=""/>️初めて聞いたよ<br /><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/274c.svg" data-marp-twemoji=""/>️お疲れ様。なんかあった？</td>
<td>類似度高い会話を検索成功<br />「前その話した？」では検索失敗<br />「緊張」で類似検索しても無理</td>
</tr>
<tr>
<td style="text-align:center">クエリ拡張</td>
<td>そろそろ登壇がある → 前その話した？<br />パソコンで登壇資料作らなきゃ</td>
<td><img class="emoji" draggable="false" alt="⭕️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/2b55.svg" data-marp-twemoji=""/>先月言ってた登壇イベントだよね<br /><img class="emoji" draggable="false" alt="⭕️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/2b55.svg" data-marp-twemoji=""/>PC直ったの？そろそろ登壇だね</td>
<td>文脈から「登壇」を検索<br />「PC」「登壇」に複数クエリ分割</td>
</tr>
<tr>
<td style="text-align:center">全文検索</td>
<td>グラが飛べるようになった</td>
<td><img class="emoji" draggable="false" alt="⭕️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/2b55.svg" data-marp-twemoji=""/>文鳥の成長は早いね</td>
<td>ベクトル検索で弱い固有名詞対策</td>
</tr>
<tr>
<td style="text-align:center">保存時クエリ予測</td>
<td>今日は緊張したよ</td>
<td><img class="emoji" draggable="false" alt="⭕️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/2b55.svg" data-marp-twemoji=""/>もしかして登壇今日だった？</td>
<td>保存時に「緊張」が来ると予想</td>
</tr>
<tr>
<td style="text-align:center">Agentic検索</td>
<td>チノのご飯買わなきゃ</td>
<td><img class="emoji" draggable="false" alt="⭕️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/2b55.svg" data-marp-twemoji=""/>文鳥チノちゃんにはシードだね</td>
<td>チノ→文鳥、文鳥→ペレット嫌い発見</td>
</tr>
</tbody>
</table>
</div>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>

<header>AI Talks #7 - 対話型AIの記憶管理</header>

<h1 id="mem012">Mem0（1/2）</h1>
<div class="small">
<p>AIアシスタントやエージェントに長期記憶レイヤーを提供するライブラリ</p>
<ul>
<li>短期記憶は持たない</li>
<li>基本的にシンプルなベクトル検索という印象（グラフはデフォルトでOFF）</li>
<li>user_idごとの会話を保存できる</li>
<li>LLMで<strong>ファクト（事実文）抽出</strong> → ベクトルストアに保存
<ul>
<li>抽出カテゴリは7種（嗜好、個人情報、計画、健康、職業…）</li>
<li><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/274c.svg" data-marp-twemoji=""/>️ 「元気？」は保存されたので、追加プロンプトでチューニングは必要</li>
<li>→ <code>custom_fact_extraction_prompt</code> で抽出処理をカスタマイズ可能</li>
</ul>
</li>
<li>ベクトルストア20種以上サポート（Qdrant, Chroma, PGVector, Milvus, FAISS…）</li>
<li><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/274c.svg" data-marp-twemoji=""/>️ 常にコンテキストに含めたい情報（名前等）を管理する仕組はがない
<ul>
<li>検索結果に含まれる保証がないので、重要情報を毎回確実に渡せない</li>
</ul>
</li>
</ul>
</div>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-paginate="skip" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" style="--paginate:skip;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;">
<header>AI Talks #7 - 対話型AIの記憶管理</header>

<h1 id="mem022">Mem0（2/2）</h1>
<div class="small">
<ul>
<li><strong>記憶更新</strong>: 新ファクトと既存記憶をLLMに比較させ ADD, UPDATE, DELETE, NONE を自動判定
<ul>
<li>関連する既存記憶の上位5件だけを取ってきて比較している</li>
<li><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/274c.svg" data-marp-twemoji=""/>️ 軽く試した感じ重複しやすい・修正がイマイチなことも（強いモデルと明確な指示が必要かも）</li>
</ul>
</li>
<li><strong>リランキング対応</strong>（Cohere, SentenceTransformer, HuggingFace, ZeroEntropy, LLM Reranker）</li>
<li><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/274c.svg" data-marp-twemoji=""/>️ クエリ拡張は無い（単純にクエリ文字列をそのままembedding）
<ul>
<li>単体の会話を投げると失敗する可能性あり → 前処理やコンテキストをまとめて検索が必要</li>
</ul>
</li>
<li><strong>ナレッジグラフにも対応</strong>（Neo4j, Memgraph, Neptune, Kuzu）
<ul>
<li>LLMでエンティティ抽出 → リレーション抽出 → embedding類似度で既存ノードと意味的マッチ</li>
<li>表記ゆれ対策: 文字列正規化 + embedding類似度でノードの同一性判定</li>
<li><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/274c.svg" data-marp-twemoji=""/>️ グラフは不安定＆遅くて実用性に課題</li>
</ul>
</li>
</ul>
</div>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-paginate="skip" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" style="--paginate:skip;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;">
<header>AI Talks #7 - 対話型AIの記憶管理</header>

<h1 id="zep-graphiti12">Zep, Graphiti（1/2）</h1>
<div class="small">
<p>Graphitiベースの時系列ナレッジグラフを活用するコンテキストエンジニアリングプラットフォーム</p>
<p><strong>短期記憶</strong></p>
<ul>
<li>PostgreSQLにメッセージ保存、<code>lastN</code>（デフォルト4〜6件）で直近N件を取得</li>
<li>OSS版に明示的な要約・圧縮はない（Cloud版の&quot;summary&quot;モードで対応）</li>
</ul>
<p><strong>Graphiti: 時系列ナレッジグラフ</strong></p>
<ul>
<li>検索:
<ul>
<li>4種: Node（エンティティ）, Edge（ファクト）, Episode（エピソード）, Community（クラスタ）</li>
<li>アルゴリズム: BM25 + コサイン類似性 + BFSの組み合わせ</li>
</ul>
</li>
<li>保存: エンティティ抽出、関係性抽出、重複除去が行われる</li>
</ul>
</div>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="skip" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" style="--paginate:skip;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;">
<header>AI Talks #7 - 対話型AIの記憶管理</header>

<h1 id="zep-graphiti22">Zep, Graphiti（2/2）</h1>
<div class="small">
<p><strong>長期記憶</strong></p>
<ul>
<li>取得時は直近4メッセージでGraphitiを検索し、関連Fact（最大5件）を取得
<ul>
<li>Node, Edge, Episode の3つを並列検索</li>
</ul>
</li>
<li>各Factに <code>valid_at</code>, <code>invalid_at</code> で事実の時間的変遷を追跡</li>
<li>PydanticでKGのスキーマ（ノード型・エッジ型）をドメインごとにカスタム定義可能
<ul>
<li>デフォルト9種: User, Assistant, Preference, Location, Event, Object, Topic, Organization, Document</li>
</ul>
</li>
<li>5種のリランカー: RRF（逆順位和）, MMR（多様性確保）, node_distance（グラフ距離）, episode_mentions（頻度）, cross_encoder</li>
<li>ソフトデリート + 定期パージ方式（<code>deleted_at</code> → <code>purgeDeleted</code> で物理削除）</li>
</ul>
</div>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-paginate="skip" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" style="--paginate:skip;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;">
<header>AI Talks #7 - 対話型AIの記憶管理</header>

<h1 id="letta13">Letta（1/3）</h1>
<div class="small">
<p>旧MemGPT。OSの仮想メモリ管理に着想を得たステートフルAIエージェントプラットフォーム</p>
<p><strong>短期記憶: コアメモリ（ブロック）+ メッセージ要約</strong></p>
<ul>
<li>「ブロック」をシステムプロンプトに埋め込み、エージェント自身がツール呼び出しで読み書き
<ul>
<li>ブロック: デフォルトは <code>persona</code>（AIの性格）と <code>human</code>（ユーザー情報）の2つ。任意追加可能</li>
<li>追記・置換・行挿入・全書き換え等の編集ツールを5種提供</li>
</ul>
</li>
<li>多彩なコンパクション戦略（<code>CompactionSettings</code> で切り替え）
<ul>
<li>Static Buffer: 固定件数（デフォルト60件）超過で古いメッセージを削除、最小15件保持</li>
<li>Partial Evict: メッセージの30%を削除し、LLMで要約してindex 1に挿入（同期）</li>
<li>Sliding Window: スライディングウィンドウ式の部分要約（自身のLLMで行うモードも選択可能）</li>
<li>多段フォールバック: 自身のLLMで要約 → 専用処理で要約 → ツール出力切り詰め → 中間部削除</li>
</ul>
</li>
<li>トリガー: コンテキストウィンドウの90%超過時、またはLLMがコンテキスト超過エラーを返した時</li>
<li>要約プロンプトは7項目（目標、経緯、重要詳細、エラー修正、現状、次ステップ、検索ヒント）</li>
</ul>
</div>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-paginate="skip" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" style="--paginate:skip;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;">
<header>AI Talks #7 - 対話型AIの記憶管理</header>

<h1 id="letta23">Letta（2/3）</h1>
<div class="small">
<p><strong>長期記憶: アーカイバルメモリ + 会話検索</strong></p>
<ul>
<li>エージェントが重要と判断した情報をツール呼び出しで長期記憶に保存・検索（ベクトル検索）</li>
<li>3つのベクトルDBバックエンド: PostgreSQL pgvector（デフォルト）, Turbopuffer, Pinecone
<ul>
<li>Turbopuffer: ハイブリッド検索（ANN + BM25 → RRF統合）、タグ・日付範囲フィルタ</li>
<li>Pinecone: リランキング対応（<code>bge-reranker-v2-m3</code>）</li>
</ul>
</li>
<li>会話検索: <code>conversation_search</code> ツールで過去メッセージをハイブリッド検索（同じ仕組み）</li>
<li>ソフトデリート（<code>is_deleted</code> フラグ）。タグの自動重複排除</li>
<li><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/274c.svg" data-marp-twemoji=""/>️ TTL・時間減衰は未実装</li>
</ul>
</div>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" data-paginate="skip" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" style="--paginate:skip;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;">
<header>AI Talks #7 - 対話型AIの記憶管理</header>

<h1 id="letta33">Letta（3/3）</h1>
<div class="small">
<p><strong>工夫</strong></p>
<ul>
<li>メインとは別に、バックグラウンドで動作する<strong>Sleeptimeエージェント</strong>が会話後に記憶を整理
<ul>
<li>メイン応答完了後、Nターンに1回バックグラウンドタスクを発行</li>
<li>Sleeptimeエージェントは会話トランスクリプトを受け取り、共有コアメモリブロックを更新</li>
</ul>
</li>
<li>役割分担: メインは応答と検索に専念し、コアメモリの編集はSleeptimeに委任</li>
<li>Git-backedコアメモリ: ブロックをgitリポジトリに保存し変更履歴をコミット単位で追跡</li>
<li>コアメモリに行番号を付与し、エージェントが行単位で挿入・編集可能に</li>
<li>ツール呼び出しにルール制約（終了条件、呼び出し順序、回数上限等）を設定可能</li>
<li>ReActスタイルのエージェントループ（最大50ステップ）</li>
</ul>
</div>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-paginate="skip" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" style="--paginate:skip;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;">
<header>AI Talks #7 - 対話型AIの記憶管理</header>

<h1 id="simplemem12">SimpleMem（1/2）</h1>
<div class="small">
<p>対話エージェント向けの長期記憶フレームワーク</p>
<p><strong>リアルタイムな保存処理</strong></p>
<ul>
<li>対話をLLMで構造化された記憶ユニット（MemoryEntry）に変換
<ul>
<li>代名詞の排除、相対時間→ISO 8601絶対化、アトミックな事実文への変換、Embedding</li>
</ul>
</li>
<li>前ウィンドウの記憶エントリ（最大3件）を参照コンテキストとしてLLMに渡し重複を抑制</li>
<li>Provenance Tracking: 記憶エントリとソースエビデンスの紐付けを維持</li>
</ul>
<p><strong>検索</strong></p>
<ul>
<li>3層ハイブリッド検索: 意味検索（embedding）+ キーワード検索（BM25）+ メタデータフィルタ（日時・場所・人名等）を並列実行</li>
<li>LLMが情報要件分析 → ターゲットクエリ生成（最大4件）→ 3層並列検索 → Reflection（十分性判定、最大2ラウンド）</li>
</ul>
</div>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-paginate="skip" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" style="--paginate:skip;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;">
<header>AI Talks #7 - 対話型AIの記憶管理</header>

<h1 id="simplemem22">SimpleMem（2/2）</h1>
<div class="small">
<p><strong>セッション間の記憶</strong></p>
<ul>
<li>保存時: セッション終了時に
<ul>
<li>サマリー: セッションのLLM要約</li>
<li>Observation: ツール使用やファイル変更等のイベントからヒューリスティック抽出</li>
</ul>
</li>
<li>取得時: セッション開始時に「サマリー（最大5件）→過去セッションの知見（最大20件）→セマンティック検索（最大10件）」の優先度順で指定トークン上限（デフォルト2000トークン）まで入れる</li>
</ul>
<p><strong>記憶整理: Consolidation Worker（Decay→Merge→Prune の3フェーズ）</strong></p>
<ul>
<li>Decay: 90日超のエントリに importance × 0.9 の減衰</li>
<li>Merge: cosine類似度 0.95超のペアで importance が低い方をソフト削除</li>
<li>Prune: importance 0.05未満のエントリを論理削除</li>
</ul>
</div>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-paginate="skip" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" style="--paginate:skip;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;">
<header>AI Talks #7 - 対話型AIの記憶管理</header>

<h1 id="memos12">MemOS（1/2）</h1>
<div class="small">
<p>汎用AIエージェント向けのMemory Operating System</p>
<p><strong>保存: メッセージ追加時に全メモリタイプを同時生成</strong></p>
<ul>
<li>メッセージ追加API呼び出し時にリアルタイムで記憶抽出（同期/非同期どちらも対応）</li>
<li>二段階処理: LLM不要で即保存 → 非同期でLLMが構造化抽出・タイプ振り分け（レイテンシ隠蔽）</li>
<li>記憶抽出時の入力は1024トークンのスライドウィンドウで分割（200トークンオーバーラップ）</li>
<li>WorkingMemoryは上限20件のFIFO管理（80%到達時に古いものから事前削除）</li>
<li>embedding類似度（≥0.8）でLLMが矛盾, 冗長, 独立を判定 → 融合 or タイムスタンプで新しい方を残す</li>
<li>幻覚フィルタリング: LLM抽出後の記憶を原文対話と照合して根拠のない記憶を除外</li>
<li>GraphStructureReorganizer: バックグラウンドでKMeans+LLMによるクラスタリング→要約親ノード→関係エッジの自動生成</li>
<li>MemFeedback: 自然言語による記憶の修正（キーワード置換、セマンティック更新）</li>
<li>ステータス管理: activated, resolving, archived, deleted</li>
</ul>
</div>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" data-paginate="skip" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" style="--paginate:skip;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;">
<header>AI Talks #7 - 対話型AIの記憶管理</header>

<h1 id="memos22">MemOS（2/2）</h1>
<div class="small">
<p><strong>検索</strong></p>
<ul>
<li>メモリタイプ別に以下を並列検索し、リランカーで統合:
<ul>
<li>WorkingMemory: 直近の記憶（上限小さいので全件取得）</li>
<li>LongTermMemory: 会話から抽出された長期的な知識</li>
<li>UserMemory: ユーザーの属性・嗜好（16項目の客観情報+9項目の主観情報）</li>
<li>ToolMemory: ツールのスキーマや過去の実行履歴</li>
<li>SkillMemory: エージェントが習得したスキル</li>
<li>PreferenceMemory: ユーザーの好み・設定</li>
</ul>
</li>
<li>LongTermMemory+UserMemoryはグラフ検索+ベクトル検索+BM25+全文検索の4手法を併用</li>
<li>CoTクエリ拡張: 複雑なクエリをLLMでサブクエリに分解→各embeddingで並列検索</li>
<li>Agentic検索: QueryRewriter → メモリ検索 → ReflectionAgent（十分性判定）→ 不足なら再検索ループ</li>
</ul>
</div>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="36" data-paginate="skip" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" style="--paginate:skip;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;">
<header>AI Talks #7 - 対話型AIの記憶管理</header>

<h1 id="memoryos12">MemoryOS（1/2）</h1>
<div class="small">
<p>パーソナライズ対話AI向け。OSのメモリ管理メタファーを徹底した3層階層型アーキテクチャ</p>
<p><strong>短期記憶（deque）</strong></p>
<ul>
<li><code>deque(maxlen=10)</code> で生の会話ペアを保持。要約・圧縮なし</li>
<li>満杯になると最古の会話ペアが中期記憶へ追い出し</li>
</ul>
<p><strong>中期記憶（セッション + FAISS + ヒープ）</strong></p>
<ul>
<li>追い出された会話ペアをLLMでマルチトピック要約（最大2テーマ）→ テーマ別にセッション化</li>
<li>セッションマージ判定: 意味的類似度 + キーワードJaccard類似度の合算スコア</li>
<li>2段階検索: FAISSでセッション絞り込み → 会話ペア単位で類似度フィルタ → 全体からtop-N選出</li>
<li>ヒートスコア: 検索ヒット回数 + 蓄積会話ペア数 + 直近アクセス度（時間減衰）の重み付き合算</li>
<li>ページ間の双方向リンクで会話連鎖を保持</li>
<li>LFU追い出し（セッション数がmax_capacityを超えた場合）</li>
</ul>
</div>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" data-paginate="skip" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" style="--paginate:skip;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;">
<header>AI Talks #7 - 対話型AIの記憶管理</header>

<h1 id="memoryos22">MemoryOS（2/2）</h1>
<div class="small">
<p><strong>長期記憶（プロフィール + ナレッジ）</strong></p>
<ul>
<li>ヒートスコアが閾値を超えると昇格トリガー → LLMで並列に以下を実行
<ul>
<li>パーソナリティ分析（プロンプト上は「90次元」だが実装は51次元: Big Five+Needs 16、AI Alignment 8、コンテンツ興味タグ 27）</li>
<li>知識抽出（ユーザー私的データ + アシスタント知識を分離管理）</li>
</ul>
</li>
<li>ナレッジは deque(maxlen=100) で容量管理。FAISSで検索</li>
<li>検索は3並列実行（中期記憶、ユーザー知識、アシスタント知識）</li>
<li>Embeddingキャッシュ（10,000エントリ超で古い1,000件を削除）</li>
</ul>
</div>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" data-paginate="skip" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" style="--paginate:skip;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;">
<header>AI Talks #7 - 対話型AIの記憶管理</header>

<h1 id="memary12">Memary（1/2）</h1>
<div class="small">
<p>ツール呼び出し型パーソナルエージェント向けのKGベース記憶管理ライブラリ<br />
<strong>短期記憶</strong></p>
<ul>
<li><code>Context</code>（role+content）のリストで会話履歴を保持（JSONファイルに永続化）</li>
<li>先頭2件と末尾5件は保護。中間メッセージをLLMで50語に要約（約2867トークン超過で発火）</li>
</ul>
<p><strong>長期記憶: ナレッジグラフ + Memory Module の二層構造</strong></p>
<ul>
<li>ナレッジグラフ: エージェントの応答を自動的にトリプレットとしてKGに書き戻し（自己成長型）
<ul>
<li>検索はキーワードモード + LLMによる動的同義語展開 + 深さ1〜2のサブグラフ取得</li>
<li>KGにヒットなければPerplexity APIで外部検索にフォールバック</li>
</ul>
</li>
<li>Memory Stream: エンティティ名+タイムスタンプのログ（知識の幅=breadth）</li>
<li>Entity Knowledge Store: エンティティごとの参照回数+最新日時（知識の深さ=depth）
<ul>
<li>参照回数上位20エンティティをコンテキストに注入してパーソナライズ</li>
<li><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/274c.svg" data-marp-twemoji=""/>️ 実装にバグの疑いあり（上位ではなく下位が選択されている可能性）</li>
</ul>
</li>
</ul>
</div>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" data-paginate="skip" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" style="--paginate:skip;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;">
<header>AI Talks #7 - 対話型AIの記憶管理</header>

<h1 id="memary22">Memary（2/2）</h1>
<div class="small">
<p><strong>記憶整理</strong></p>
<ul>
<li><code>remove_old_memory(days)</code> による日数ベース削除はあるが自動発火なし</li>
<li>Entity Knowledge Store レベルで同名エンティティは1件に統合（参照回数は加算）</li>
<li><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/274c.svg" data-marp-twemoji=""/>️ TTL・時間減衰・矛盾検出は未実装</li>
</ul>
<p><strong>アーキテクチャ</strong></p>
<ul>
<li>モノリシック構成。LlamaIndex ReActエージェントによる Thought→Action→Observation ループ</li>
<li>ペルソナファイル（system, user）を手動作成し、エージェントの性格・ユーザー属性を常駐</li>
<li><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/274c.svg" data-marp-twemoji=""/>️ ベクトル検索を使わずKGのキーワード検索に依存 → セマンティックなあいまい検索に弱い</li>
</ul>
</div>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" data-paginate="skip" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" style="--paginate:skip;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;">
<header>AI Talks #7 - 対話型AIの記憶管理</header>

<h1 id="graphrag12">GraphRAG（1/2）</h1>
<div class="small">
<p>Microsoft GraphRAG。非構造テキストからLLMでナレッジグラフを構築するバッチ型パイプライン</p>
<p><strong>保存時: ナレッジグラフ構築</strong></p>
<ul>
<li>テキストチャンク → LLMでエンティティ・リレーションシップ抽出 → 説明文のLLM要約 → Hierarchical Leidenで階層コミュニティ構築 → コミュニティレポート生成</li>
<li>Gleanings: 「多くのエンティティが見落とされている」とLLMに追加抽出を繰り返し促す</li>
<li>増分インデックス: 差分ドキュメントのみ処理→旧インデックスとマージ</li>
</ul>
<p><strong>検索時: 4つの戦略</strong></p>
<ul>
<li>Local Search: エンティティ中心。ベクトル類似度でエンティティ特定 → コミュニティレポート+テキストチャンク+エンティティテーブルをトークン予算に配分</li>
<li>Global Search: コミュニティレポートのMap-Reduce。並列LLMでスコア付き要点抽出→集約</li>
<li>DRIFT Search: HyDE（仮説文書embedding）→ フォローアップクエリで反復的にLocal Search深堀り</li>
<li>Basic Search: テキストユニットへの直接ベクトル検索（標準RAG）</li>
</ul>
</div>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" data-paginate="skip" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" style="--paginate:skip;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;">
<header>AI Talks #7 - 対話型AIの記憶管理</header>

<h1 id="graphrag22">GraphRAG（2/2）</h1>
<div class="small">
<p><strong>工夫</strong></p>
<ul>
<li>Dynamic Community Selection（Global Searchのオプション）: ルートから階層的にLLMで関連度評価（0-5）→ 閾値以上のコミュニティだけ再帰探索</li>
<li>リレーションシップの優先順位: in-network（選択エンティティ間）を最優先、out-networkは共有リンク数でソート</li>
<li>コンテキスト枠の厳密管理: 各セクション（会話履歴、コミュニティ、エンティティ等）にトークン上限を個別配分</li>
<li>全検索モードでストリーミング対応</li>
<li>タイムスタンプ自動管理（年月日時を分解してフィルタ可能なフィールドとして保存）</li>
<li><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/274c.svg" data-marp-twemoji=""/>️ TTLや時間減衰スコアリングは未実装</li>
</ul>
</div>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" data-paginate="skip" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" style="--paginate:skip;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;">
<header>AI Talks #7 - 対話型AIの記憶管理</header>

<h1 id="langchain-langgraph12">LangChain, LangGraph（1/2）</h1>
<div class="small">
<p>LLMアプリケーション構築フレームワーク + ステートフルエージェント基盤</p>
<p><strong>短期記憶</strong></p>
<ul>
<li>SummarizationMiddleware: トークン超過時に古いメッセージをLLMで構造化要約に置換
<ul>
<li>ユーザーの目的・意思決定・変更ファイル・残タスクの4セクション</li>
</ul>
</li>
<li>ContextEditingMiddleware: トークン超過時に古いツール出力を <code>[cleared]</code> に置換（直近N件保護）</li>
<li>Checkpoint: thread_id単位で実行状態をステップごとにスナップショット → 同一thread_idで会話継続</li>
<li>タイムトラベル: checkpoint_id指定で過去の任意の状態に巻き戻し可能</li>
<li>pre_model_hook, post_model_hook: LLM呼び出し前後にカスタムロジックを差し込む拡張点</li>
<li>ノード出力キャッシュ: 同一入力に対するノード再実行をスキップ（TTL付き）</li>
<li>Classic Memory（deprecated）: Buffer, Window, Summary, SummaryBuffer 等</li>
</ul>
</div>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="43" data-paginate="skip" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" style="--paginate:skip;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;">
<header>AI Talks #7 - 対話型AIの記憶管理</header>

<h1 id="langchain-langgraph22">LangChain, LangGraph（2/2）</h1>
<div class="small">
<p><strong>長期記憶</strong></p>
<ul>
<li>スレッド横断の汎用KVストア（階層パスでユーザーやプロジェクト別に分離可能）
<ul>
<li>記憶の抽出・保存ロジックは組み込まれず、開発者がノード内で実装する「インフラ」</li>
</ul>
</li>
<li>ベクトル検索・フィルタ検索に対応</li>
<li>TTL: 読み書き時にリフレッシュ（頻繁にアクセスされるアイテムは期限切れにならない）</li>
<li>Classic Memory（deprecated）: VectorStoreRetrieverMemory, EntityMemory, KGMemory 等</li>
<li><a href="https://github.com/langchain-ai/langchain-community">LangChain Community</a> にKGメモリ（NetworkX）、<a href="https://github.com/langchain-ai/langchain-neo4j">LangChain Neo4j</a> にグラフDB連携あり</li>
</ul>
</div>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="44" data-paginate="skip" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" style="--paginate:skip;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;">
<header>AI Talks #7 - 対話型AIの記憶管理</header>

<h1 id="adk12">ADK（1/2）</h1>
<div class="small">
<p>Google Agent Development Kit。エージェント構築フレームワーク。記憶管理はフレームワークの一機能</p>
<p><strong>短期記憶: 多彩なコンテキスト制御</strong></p>
<ul>
<li>2つの圧縮戦略
<ul>
<li>トークン閾値ベース: <code>token_threshold</code> 超過時にLLMで要約（直近N件は非圧縮で保持）</li>
<li>スライディングウィンドウ: N回の呼び出しごとにトリガー（overlap_sizeで文脈連続性を維持）</li>
</ul>
</li>
<li>コンテキストキャッシュ（<code>ContextCacheConfig</code>）: キャッシュ再利用回数上限、TTL、最小トークン数を設定可能</li>
<li><code>static_instruction</code> で静的システムインストラクションを分離 → Gemini APIのキャッシュの恩恵</li>
<li>サブエージェント間のコンテキスト分離</li>
<li>ツール呼び出し/応答ペアが分断されないよう安全な分割位置を算出</li>
</ul>
</div>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="45" data-paginate="skip" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" style="--paginate:skip;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;">
<header>AI Talks #7 - 対話型AIの記憶管理</header>

<h1 id="adk22">ADK（2/2）</h1>
<div class="small">
<p><strong>長期記憶: 3層のメモリサービス実装</strong></p>
<ul>
<li>InMemoryMemoryService: キーワードマッチング（プロトタイプ用）</li>
<li>VertexAiRagMemoryService: Vertex AI RAGコーパスにアップロード → ベクトル検索</li>
<li>VertexAiMemoryBankService: マネージドサービス（統合・リビジョン・TTL対応、非同期メモリ生成）</li>
</ul>
<p><strong>メモリ取得の2パターン</strong></p>
<ul>
<li>ユーザー入力で即検索（通常RAG） か LLMが判断して検索（Agentic RAG）を選択可能</li>
</ul>
</div>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="46" data-paginate="skip" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" style="--paginate:skip;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;">
<header>AI Talks #7 - 対話型AIの記憶管理</header>

<h1 id="llamaindex12">LlamaIndex（1/2）</h1>
<div class="small">
<p>LLMアプリケーション構築のためのデータフレームワーク</p>
<p><strong>短期記憶</strong></p>
<ul>
<li>会話メッセージを毎ターンDBに保存（デフォルトSQLite、PostgreSQL等に切替可能）</li>
<li>トークン超過時、古いメッセージを排出 → 長期記憶ブロックに自動転送（会話ペア単位で安全に分割）</li>
<li>ツール呼び出しループ中はメモリ書き込みを遅延し、完了後にまとめて保存</li>
<li>ChatMemoryBuffer（スライディングウィンドウ）、ChatSummaryMemoryBuffer（要約）はdeprecated</li>
</ul>
</div>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="47" data-paginate="skip" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" style="--paginate:skip;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;">
<header>AI Talks #7 - 対話型AIの記憶管理</header>

<h1 id="llamaindex22">LlamaIndex（2/2）</h1>
<div class="small">
<p><strong>長期記憶</strong></p>
<ul>
<li>VectorMemoryBlock: 排出メッセージバッチをベクトルストアに格納 → 直近N件からクエリ構築して検索
<ul>
<li>node_postprocessors でリランキング・フィルタリング可能</li>
<li>TimeWeightedPostprocessor: <code>(1-decay)^hours</code> の時間減衰スコアリング</li>
</ul>
</li>
<li>FactExtractionMemoryBlock: LLMでファクト抽出（重複排除あり）→ max_facts 超過時にLLMで凝縮</li>
<li>StaticMemoryBlock: 開発者が設定した固定テキストを毎回注入するだけ</li>
<li>PropertyGraphIndex: LLMでエンティティ・リレーション抽出しグラフ構築（Neo4j等7種対応）
<ul>
<li>検索はLLM同義語展開、ベクトル、Cypher生成、テンプレートの4種を組合せ可能</li>
</ul>
</li>
<li>トークン超過時はメモリブロック単位で低優先度から順に切り詰め（優先度は開発者が設定）</li>
</ul>
</div>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="48" data-paginate="skip" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" style="--paginate:skip;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;">
<header>AI Talks #7 - 対話型AIの記憶管理</header>

<h1 id="opencode13">OpenCode（1/3）</h1>
<div class="small">
オープンソースのAIコーディングエージェント
<p><strong>短期記憶: Compaction + Pruning の二段構成</strong></p>
<ul>
<li>Compactionエージェントが会話全体を要約
<ul>
<li>要約テンプレート: Goal, Instructions, Discoveries, Accomplished, Relevant files</li>
<li>オーバーフロー時、ユーザーの最後の質問を退避→要約完了後に再投入（メッセージリプレイ）</li>
</ul>
</li>
<li>Pruning: 古いツール出力を選択的に <code>[Old tool result content cleared]</code> に置換
<ul>
<li>直近2ターン+直近40,000トークン分のツール出力は保護</li>
<li><code>skill</code> ツールの出力は保護対象</li>
</ul>
</li>
<li>プロバイダ横断のコンテキストキャッシュ最適化
<ul>
<li>Anthropic（ephemeral cacheControl）、OpenAI（promptCacheKey=sessionID）、Bedrock等に対応</li>
<li>システムプロンプトを「安定部分」と「可変部分」の2パートに分割しキャッシュヒット率最大化</li>
</ul>
</li>
<li>Doom Loop検出: 同一ツール+同一入力が3回連続で呼ばれたらユーザーに確認</li>
</ul>
</div>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="49" data-paginate="skip" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" style="--paginate:skip;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;">
<header>AI Talks #7 - 対話型AIの記憶管理</header>

<h1 id="opencode23">OpenCode（2/3）</h1>
<div class="small">
<p><strong>長期記憶</strong></p>
<ul>
<li><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@16.0.1/assets/svg/274c.svg" data-marp-twemoji=""/>️ ベクトル検索やナレッジグラフ等の長期記憶機構は実装されていない
<ul>
<li>セッション間の知識共有は <code>AGENTS.md</code> 等のファイルベースの設定に限定</li>
<li>ソースコード等のファイル自体が「記憶」として機能するという思想</li>
</ul>
</li>
</ul>
<p><strong>探索サブエージェント</strong></p>
<ul>
<li>exploreサブエージェントにコードベース探索を委譲
<ul>
<li>grep（正規表現でファイル内容検索）、glob（パターンでファイル検索）、list（ディレクトリ一覧）、read（ファイル読み取り）、codesearch（Exa AI MCPでコードスニペット/ドキュメント検索）、webfetch（URL取得）、bash（読み取り専用シェルコマンド）等のツールを使える</li>
<li>メインエージェントとコンテキストが分離 → 探索結果のうち必要な情報だけを返す</li>
<li>list/globにはlimit=100等の制限。Truncateされるとエージェントが次の検索案を考え、Grep全文検索やRead offset/limitに切り替える</li>
</ul>
</li>
</ul>
</div>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="50" data-paginate="skip" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" style="--paginate:skip;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;">
<header>AI Talks #7 - 対話型AIの記憶管理</header>

<h1 id="opencode33">OpenCode（3/3）</h1>
<div class="small">
<p><strong>Skills</strong></p>
<ul>
<li>ディレクトリ内のskill定義がSkillToolとして登録。呼び出し時にコンテキストをプロンプトに注入（実質コンテキストを返すToolCalling）</li>
<li>skillsの一覧は毎回コンテキストに含まれる</li>
</ul>
<p><strong>MCP</strong></p>
<ul>
<li>MCPも実質ToolCallingと同じ</li>
</ul>
<p><strong>アーキテクチャ</strong></p>
<ul>
<li>7種のエージェント構成（build, plan, general, explore, compaction, title, summary）</li>
</ul>
</div>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="51" data-paginate="skip" data-header="AI Talks #7 - 対話型AIの記憶管理" data-footer="Tomoki Yoshida (birder) - DeNA" data-theme="default" data-style="@import &quot;style.css&quot;" lang="ja-JP" style="--paginate:skip;--header:AI Talks #7 - 対話型AIの記憶管理;--footer:Tomoki Yoshida (birder) - DeNA;--theme:default;--style:@import &quot;style.css&quot;;">
<header>AI Talks #7 - 対話型AIの記憶管理</header>

<h1 id="openclaw12">OpenClaw（1/2）</h1>
<div class="small">
<p>ローカルファーストのパーソナルAIアシスタント</p>
<p><strong>短期記憶: 段階的なコンテキスト削減</strong></p>
<ul>
<li>Compaction（LLM要約圧縮）: <code>/compact</code> コマンドまたはオーバーフロー時に自動実行
<ul>
<li>自動メモリフラッシュ: Compaction直前に重要な記憶をファイルに書き出してから圧縮</li>
</ul>
</li>
<li>Context Pruning（ツール結果の段階的枝刈り）:
<ul>
<li>Soft Trim（30%超）→ 4000文字超のツール結果の先頭1500+末尾1500文字を保持</li>
<li>Hard Clear（50%超）→ ツール結果を <code>[Old tool result content cleared]</code> に完全置換</li>
<li>直近3回のアシスタント応答に紐づくツール結果は保護</li>
</ul>
</li>
<li>Cache TTLモード: Anthropicのprompt cachingと協調し、TTL期間内（デフォルト5分）はプルーニングを抑制してキャッシュヒット率を維持</li>
<li>History Turns制限、ツール結果トランケーション（30%上限）、画像データ置換</li>
</ul>
</div>
<footer>Tomoki Yoshida (birder) - DeNA</footer>

<header>AI Talks #7 - 対話型AIの記憶管理</header>

<h1 id="openclaw22">OpenClaw（2/2）</h1>
<div class="small">
<p><strong>長期記憶: SQLite + sqlite-vec によるローカル完結型</strong></p>
<ul>
<li><code>memory/</code> ディレクトリのMarkdownファイルをインデックス化
<ul>
<li><code>memory/YYYY-MM-DD.md</code>: <code>AGENTS.md</code> でエージェントに当日・前日分の読み込みを指示する運用</li>
</ul>
</li>
<li>ハイブリッド検索（デフォルト有効）: ベクトルスコア×0.7 + FTS5(BM25)スコア×0.3
<ul>
<li>SQLite + sqlite-vec でベクトルインデックス（外部DBサービス不要）</li>
<li>チャンク分割: 400トークン、80トークンオーバーラップ</li>
<li>親エージェントがハイブリッド検索ツールを呼ぶ形（ある意味Agentic検索）</li>
</ul>
</li>
<li>多言語クエリ拡張（英, 中, 日, 韓, 西, 葡, アラビア語のストップワード辞書+言語固有トークナイズ）</li>
<li>MMRリランキングはオプション（デフォルト無効）</li>
<li>指数関数的時間減衰（半減期30日）: デフォルト無効。<code>MEMORY.md</code> 等の日付なしファイル（常に有効な知識）は減衰対象外</li>
<li>ファイルハッシュベースの差分sync + embeddingキャッシュで再計算回避</li>
</ul>
</div>
<footer>Tomoki Yoshida (birder) - DeNA</footer>
</section>
